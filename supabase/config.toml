# Supabase local dev config — `supabase start` reads this.
# https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "exp://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production

# verify_jwt = false: the relay only supports HS256 but this project signs JWTs with ES256.
# Each function does its own auth.getUser() check instead, which calls the auth API
# and works with any algorithm.
[functions.barcode-lookup]
verify_jwt = false

[functions.remove-background]
verify_jwt = false

[functions.identify-bottle]
verify_jwt = false

[functions.public-api]
verify_jwt = false
